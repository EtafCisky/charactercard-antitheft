version: '3.8'

services:
  # MySQL 数据库
  db:
    image: mysql:8.0
    container_name: anti-theft-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./anti-theft-server/scripts/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3306:3306"
    networks:
      - anti-theft-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API 服务器
  api:
    build:
      context: ./anti-theft-server
      dockerfile: Dockerfile
    container_name: anti-theft-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SERVER_PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGINS: ${CORS_ORIGINS}
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS_PER_IP: 10
      RATE_LIMIT_MAX_REQUESTS_PER_CARD: 5
      LOG_LEVEL: info
      BCRYPT_SALT_ROUNDS: 12
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - anti-theft-network
    volumes:
      - api_logs:/app/logs

  # Web 管理界面
  web:
    build:
      context: ./anti-theft-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${API_BASE_URL}
    container_name: anti-theft-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - anti-theft-network

  # Nginx 反向代理（可选，用于 HTTPS 和统一入口）
  nginx:
    image: nginx:alpine
    container_name: anti-theft-nginx
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - anti-theft-network
    profiles:
      - with-ssl

networks:
  anti-theft-network:
    driver: bridge

volumes:
  db_data:
  api_logs:
